name: deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    #Only for "release" branch 
    #if: startsWith(github.head_ref, 'release/') == true
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'
      - name: Run a one-line script 
        run: echo "Let's start pull job"
      - name: Run unit tests abd build
        run: | 
            ./gradlew test
            ./gradlew build
      - name: Upload jar
        uses: actions/upload-artifact@v2
        with:
         name: testSpring-0.0.1-SNAPSHOT.jar
         path: build/libs/testSpring-0.0.1-SNAPSHOT.jar
      - name: SSH Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: | 
            cd /home/a1252261/app/test-docker
            git pull
